project_name: my-nebari-existing
domain: nebari.example.com

cluster:
  existing:
    # Kubeconfig defaults to KUBECONFIG env or ~/.kube/config
    kubeconfig: ~/.kube/config
    context: "arn:aws:eks:us-west-2:123456789012:cluster/my-nebari"
    storage_class: gp2

certificate:
  type: selfsigned

# GitOps repository configuration (optional)
# Configures the repository that ArgoCD will use to manage cluster resources
git_repository:
  url: "git@github.com:my-org/my-gitops-repo.git"
  branch: main
  path: "clusters/my-nebari-existing" # Optional subdirectory within the repo
  auth:
    ssh_key_env: GIT_SSH_PRIVATE_KEY # Environment variable containing SSH private key
    # OR use token for HTTPS:
    # token_env: GIT_TOKEN
