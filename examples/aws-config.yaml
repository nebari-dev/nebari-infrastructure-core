project_name: my-nebari-aws
domain: nebari.example.com

# TLS certificate configuration
certificate:
  type: letsencrypt
  acme:
    email: admin@example.com

# GitOps repository configuration (required for foundational services)
# ArgoCD uses this repository to deploy Envoy Gateway, cert-manager, Keycloak, etc.
git_repository:
  url: "git@github.com:my-org/my-gitops-repo.git"
  branch: main
  path: "clusters/my-nebari-aws"  # Optional subdirectory within the repo
  auth:
    ssh_key_env: GIT_SSH_PRIVATE_KEY  # Environment variable containing SSH private key
    # OR use token for HTTPS:
    # token_env: GIT_TOKEN
    # SSH host keys are verified against known_hosts (SSH_KNOWN_HOSTS,
    # ~/.ssh/known_hosts, /etc/ssh/ssh_known_hosts). For ephemeral environments
    # (e.g. CI) without a known_hosts file, verification can be disabled —
    # this removes man-in-the-middle protection:
    # insecure_skip_host_key_verification: true
  # Optional: separate read-only credentials for ArgoCD (falls back to auth if not set)
  # argocd_auth:
  #   ssh_key_env: ARGOCD_SSH_KEY

# Optional: org CA trust bundle. Installs the PEM bundle into the OS trust
# store of every EKS worker node before kubelet starts, and deploys
# trust-manager to project it as a ConfigMap into every namespace for in-pod
# trust. Required when nodes or workloads must reach the EKS control plane,
# ECR, or external services through a TLS-inspecting egress proxy.
# Exactly one of `path` or `inline` may be set.
# trust_bundle:
#   path: /etc/ssl/certs/my-org-ca.pem
#   # OR
#   # inline: |
#   #   -----BEGIN CERTIFICATE-----
#   #   ...
#   #   -----END CERTIFICATE-----

cluster:
  aws:
    region: us-west-2
    kubernetes_version: "1.34"
    availability_zones:
      - us-west-2a
      - us-west-2b
    vpc_cidr_block: "10.10.0.0/16"
    endpoint_private_access: true
    endpoint_public_access: true

    # Opt-in Crossplane capabilities for software-pack cloud infrastructure.
    # Empty by default: Crossplane and its cloud permissions are not installed.
    # Enabling s3 also installs the IAM and EKS providers so each ObjectStore
    # can receive its own bounded EKS Pod Identity role. All Crossplane providers
    # share one broad account-local role (ADR-0012 dedicated-account model).
    # crossplane_capabilities:
    #   - s3

    node_groups:
      # general:
      #   instance: m7i.2xlarge
      #   min_nodes: 1
      #   max_nodes: 1
      #   # AL2023 is now the default AMI type (AL2023_x86_64_STANDARD)

      user:
        instance: m7i.xlarge
        min_nodes: 1 # minimum of 1 node required
        max_nodes: 5

      # Dedicated Longhorn storage nodes (production-recommended).
      # Small instances with large gp3 disks, tainted so only Longhorn's
      # storage components schedule here. Pair with the `longhorn` block below
      # (dedicated_nodes: true). For one node per AZ, set min_nodes == max_nodes
      # to the number of availability_zones above (2 here). disk_size sets the
      # gp3 root volume size; when omitted EKS defaults it to 20 GiB, so set it
      # explicitly for storage nodes. Capacity comes from the disk, not the
      # instance size.
      storage:
        instance: m7g.large # 2 vCPU / 8 GiB Graviton; use m7i.large for x86
        ami_type: AL2023_ARM_64_STANDARD # omit this line for x86 instances
        min_nodes: 2
        max_nodes: 2
        disk_size: 500 # GiB gp3 root volume backing /var/lib/longhorn
        labels:
          node.longhorn.io/storage: "true"
          # Triggers Longhorn default-disk creation on these nodes. NIC injects
          # this automatically for dedicated-nodes storage groups; shown here so
          # the contract is explicit.
          node.longhorn.io/create-default-disk: "true"
        taints:
          - key: node.longhorn.io/storage
            value: "true"
            effect: NO_SCHEDULE

      # worker:
      #   instance: m7i.xlarge
      #   min_nodes: 0
      #   max_nodes: 5
      #
      # # Example: GPU node group with AL2023 NVIDIA AMI
      # gpu:
      #   instance: g5.xlarge
      #   min_nodes: 0
      #   max_nodes: 3
      #   gpu: true # Uses AL2023_x86_64_NVIDIA AMI and auto-applies the
      #             # nvidia.com/gpu=true:NO_SCHEDULE taint (set your own
      #             # nvidia.com/gpu taint to override). GPU workloads must
      #             # tolerate it; the NVIDIA GPU Operator tolerates it already.
      #
      # # Example: ARM64 Graviton node group
      # graviton:
      #   instance: m7g.xlarge
      #   min_nodes: 0
      #   max_nodes: 5
      #   ami_type: AL2023_ARM_64_STANDARD
      #
      # # Example: AWS Neuron (Inferentia/Trainium) node group
      # neuron:
      #   instance: inf2.xlarge
      #   min_nodes: 0
      #   max_nodes: 2
      #   ami_type: AL2023_x86_64_NEURON

    # Longhorn distributed block storage (enabled by default on AWS).
    # Production-recommended: dedicate tainted storage nodes (see the "storage"
    # node group above) and keep at least one replica per AZ. The dedicated nodes
    # must carry the node.longhorn.io/storage=true:NoSchedule taint shown there;
    # NIC tolerates it for every Longhorn component. Replicas (the data) live only
    # on storage nodes because only they get a Longhorn disk; the csi-plugin and
    # manager still run on every node so workloads anywhere can mount volumes.
    longhorn:
      dedicated_nodes: true # confines replica DATA to the labeled/tainted storage nodes
      replica_count: 2 # one replica per storage node / AZ; raise to 3 for 3 AZs
      # node_selector:      # optional; defaults to {node.longhorn.io/storage: "true"}
      #   node.longhorn.io/storage: "true"
      # enabled: true       # default true on AWS; set false to opt out (falls back to gp2/EBS)

    # AWS Load Balancer Controller (LBC) configuration (optional).
    # Enabled by default. The controller authenticates via an EKS Pod Identity
    # association provisioned by the terraform-aws-eks-cluster module, so no
    # IRSA annotations are required on the ServiceAccount.
    #
    # To expose a workload via an NLB, annotate the Service (not handled by nic):
    #   service.beta.kubernetes.io/aws-load-balancer-type: external
    #   service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: ip
    #   service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
    # aws_load_balancer_controller:
    #   enabled: true
    #   # chart_version: "3.2.1"  # optional override; tracks latest v3.x by default

    # Scheme applied to the Gateway's NLB. Defaults to "internet-facing".
    # Set to "internal" for private-only VPCs (no public subnets / no IGW);
    # an internet-facing NLB has no public subnets to land in and will hang
    # the deploy waiting for an LB endpoint.
    # load_balancer_scheme: internet-facing  # or: internal

    # When a node group sets gpu: true, nic installs the NVIDIA GPU Operator on
    # the cluster (device plugin only; the AL2023_x86_64_NVIDIA AMI already
    # ships the driver and container toolkit) so nvidia.com/gpu becomes
    # schedulable. No extra config is required. See ADR-0006 for the rationale.

    # EFS configuration for shared storage (optional)
    # Creates an EFS file system with mount targets in each private subnet
    efs:
      enabled: true
      performance_mode: generalPurpose # generalPurpose or maxIO
      throughput_mode: bursting # bursting, provisioned, or elastic
      encrypted: true
      # storage_class_name: efs-sc      # Optional, defaults to efs-sc
      # kms_key_id: ""                  # Optional: KMS key ARN for encryption
      # provisioned_mbps: 100           # Required if throughput_mode is provisioned

    tags:
      Environment: development
      Project: nebari

# Optional: off-cluster Longhorn backups — hourly in-cluster snapshots plus a
# daily backup pushed to S3. Requires Longhorn (enabled above). On AWS the
# recommended setup is keyless: OMIT the two *_env fields below and NIC grants
# Longhorn scoped S3 access via an EKS Pod Identity association (no static keys
# to manage). Set the env-var fields only for static-key auth. Either way,
# credentials never live in this file. Full reference:
# examples/longhorn-backups-config.yaml and docs/longhorn-backups.md.
#
# Schedules are set here — there are NO defaults: when backups are enabled, BOTH
# the `snapshot` and `backup` schedules are required and are checked at
# `nic validate`. Each schedule is one Longhorn RecurringJob:
#   cron        — standard 5-field cron ("min hour day-of-month month day-of-week"), UTC
#   retain      — how many of that job's snapshots/backups to keep (rolling window); must be > 0
#   concurrency — max volumes the job processes in parallel; must be > 0
# `snapshot` is a fast in-cluster copy-on-write snapshot (no S3 traffic); `backup`
# streams changed blocks to the S3 bucket for durable, off-cluster storage.
# backups:
#   longhorn:
#     enabled: true
#     s3:
#       bucket: my-nebari-backups
#       region: us-west-2
#       create_bucket: true            # provision the bucket in the AWS Terraform module
#       # Keyless (recommended): leave the two lines below commented out to use
#       # EKS Pod Identity. Uncomment them only for static-key auth.
#       # access_key_id_env: LONGHORN_S3_ACCESS_KEY_ID
#       # secret_access_key_env: LONGHORN_S3_SECRET_ACCESS_KEY
#     # Auto-attach idle/detached volumes long enough to capture them (default true).
#     # JupyterHub user PVCs detach when servers idle out; without this they'd be
#     # silently skipped at the cron tick.
#     allow_recurring_job_while_volume_detached: true
#     schedules:
#       snapshot:
#         cron: "0 * * * *"            # top of every hour
#         retain: 24                   # keep the last 24 hourly snapshots (~1 day)
#         concurrency: 5
#       backup:
#         cron: "0 3 * * *"            # daily at 03:00 UTC
#         retain: 30                   # keep the last 30 daily backups (~1 month)
#         concurrency: 3
