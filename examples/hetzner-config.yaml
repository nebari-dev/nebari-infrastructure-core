project_name: my-nebari
domain: nebari.example.com

cluster:
  hetzner:
    location: ash
    kubernetes_version: "1.32"
    # Optional: prevent application pods from running on control-plane nodes.
    # Defaults to true, which enables single-node clusters and makes better use
    # of small Hetzner instances. Set to false for production clusters where you
    # want dedicated masters that only run etcd and the Kubernetes API server.
    # schedule_workloads_on_masters: false
    node_groups:
      master:
        instance_type: cpx31
        count: 1
        master: true
      workers:
        instance_type: cpx31
        count: 2
    # Optional: provide your own SSH keys instead of auto-generated ones.
    # If omitted, NIC generates an ed25519 key pair in ~/.cache/nic/hetzner-k3s/ssh/.
    #
    # IMPORTANT: The SSH key is required for all cluster operations (redeploy,
    # destroy, scale). If you manage the cluster from multiple computers, either
    # copy the auto-generated keys or configure your own keys here so the same
    # key is available everywhere.
    # ssh:
    #   public_key_path: "~/.ssh/id_ed25519.pub"
    #   private_key_path: "~/.ssh/id_ed25519"

    # Optional: restrict SSH and API access (defaults to 0.0.0.0/0 if omitted)
    # network:
    #   ssh_allowed_cidrs:
    #     - 203.0.113.0/24
    #   api_allowed_cidrs:
    #     - 203.0.113.0/24

certificate:
  type: selfsigned

# Optional: off-cluster Longhorn backups — hourly in-cluster snapshots plus a
# daily backup pushed to S3-compatible object storage. Requires Longhorn
# (installed by default on Hetzner). Hetzner has no bucket-provisioning Terraform
# module, so `create_bucket` is unsupported here — point at an existing
# S3-compatible bucket (e.g. Hetzner Object Storage) via `endpoint`. Credentials
# come from environment variables, never this file. Full reference:
# examples/longhorn-backups-config.yaml and docs/longhorn-backups.md.
#
# Schedules are set here — there are NO defaults: when backups are enabled, BOTH
# the `snapshot` and `backup` schedules are required and are checked at
# `nic validate`. Each schedule is one Longhorn RecurringJob:
#   cron        — standard 5-field cron ("min hour day-of-month month day-of-week"), UTC
#   retain      — how many of that job's snapshots/backups to keep (rolling window); must be > 0
#   concurrency — max volumes the job processes in parallel; must be > 0
# `snapshot` is a fast in-cluster copy-on-write snapshot (no S3 traffic); `backup`
# streams changed blocks to the object store for durable, off-cluster storage.
# backups:
#   longhorn:
#     enabled: true
#     s3:
#       bucket: my-nebari-backups
#       region: fsn1
#       endpoint: https://fsn1.your-objectstorage.com   # Hetzner Object Storage (S3-compatible)
#       access_key_id_env: LONGHORN_S3_ACCESS_KEY_ID
#       secret_access_key_env: LONGHORN_S3_SECRET_ACCESS_KEY
#     # Auto-attach idle/detached volumes long enough to capture them (default true).
#     # JupyterHub user PVCs detach when servers idle out; without this they'd be
#     # silently skipped at the cron tick.
#     allow_recurring_job_while_volume_detached: true
#     schedules:
#       snapshot:
#         cron: "0 * * * *"            # top of every hour
#         retain: 24                   # keep the last 24 hourly snapshots (~1 day)
#         concurrency: 5
#       backup:
#         cron: "0 3 * * *"            # daily at 03:00 UTC
#         retain: 30                   # keep the last 30 daily backups (~1 month)
#         concurrency: 3
