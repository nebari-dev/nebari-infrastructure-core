version: "2"

run:
  timeout: 5m

formatters:
  enable:
    - gofmt
    - goimports

linters:
  default: none
  enable:
    - errcheck
    - goconst
    - gocritic
    - gosec
    - govet
    - ineffassign
    - misspell
    - nolintlint
    - staticcheck
    - unconvert
    - unused

  settings:
    goconst:
      # Default is 3, which flags many genuinely-incidental repeats.
      # Bump to 4 so only repeated strings that clearly warrant a constant get flagged.
      min-occurrences: 4
      # Skip strings that are too generic to meaningfully name as constants.
      ignore-string-values: "^(true|false|Config|name)$"

  exclusions:
    rules:
      # Test files can have repeated strings for readability
      - path: _test\.go
        linters:
          - goconst

      # Test files use hardcoded credentials for testing purposes
      - path: _test\.go
        linters:
          - gosec
        text: "G101"

      # CLI tools need to read user-specified config files
      - path: pkg/config/
        linters:
          - gosec
        text: "G304"

      # Temp file cleanup uses os.CreateTemp paths, not user input
      - path: pkg/argocd/helm\.go
        linters:
          - gosec
        text: "G703"

      # Hetzner provider: HTTP requests use hardcoded GitHub URLs or test-injected URLs
      - path: pkg/provider/hetzner/
        linters:
          - gosec
        text: "G107|G704"

      # Hetzner provider: subprocess uses controlled binary path from our download cache
      - path: pkg/provider/hetzner/cluster\.go
        linters:
          - gosec
        text: "G204"

      # Temp file cleanup uses os.CreateTemp paths, not user input
      - path: pkg/helm/helm\.go
        linters:
          - gosec
        text: "G703"
