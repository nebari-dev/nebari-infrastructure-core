name: Add to project

on:
  issues:
    types: [opened, labeled, unlabeled]
  # Use pull_request_target (not pull_request) so the ADD_TO_PROJECT_PAT secret
  # is available on PRs opened from forks. Under pull_request, GitHub withholds
  # secrets from cross-repo (fork) PRs, leaving the token empty and failing the
  # job. This is safe here because the reusable workflow checks out no PR code -
  # it only reads trusted event metadata and calls the GitHub API.
  pull_request_target:
    types: [opened, labeled, unlabeled]

jobs:
  sync:
    # Reusable workflow pinned to an immutable SHA (was @main). The token is a
    # fine-grained PAT scoped to Projects: read/write only (see repo secrets).
    uses: nebari-dev/.github/.github/workflows/sync-project-priority.yaml@6b25f52372a97dd194f4963eaab16e18c32ca3cd # main 2026-07-14
    with:
      project-id: PVT_kwDOBd3CI84BKoKt
    secrets:
      token: ${{ secrets.ADD_TO_PROJECT_PAT }}
