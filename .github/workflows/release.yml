name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write        # upload release assets
  id-token: write        # OIDC for cosign keyless signing + attestation
  attestations: write    # write the build-provenance attestation

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    environment: release   # approval gate (see prerequisites)

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: 'v3.1.1'

      - name: Install Syft (for SBOM generation)
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - name: Run tests
        run: go test -v ./...

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Publishing the Homebrew cask pushes to nebari-dev/homebrew-tap, a
          # different repo the default GITHUB_TOKEN cannot write to.
          # HOMEBREW_TAP_TOKEN is an org-level secret with write access to the tap.
          # The fallback keeps the variable defined so GoReleaser's config template
          # always resolves even if the secret is unavailable to this repo.
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: 'dist/*.tar.gz, dist/*.zip, dist/checksums.txt'
