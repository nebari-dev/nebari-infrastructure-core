crds:
  enabled: true
# The default CA package (debian ca-certificates) backs the
# useDefaultCAs source in the nebari-trust-bundle Bundle; trust-manager
# rejects such Bundles when it runs without a default package. Enabled
# by chart default, pinned explicitly because the Bundle depends on it.
defaultPackage:
  enabled: true
app:
  trust:
    namespace: cert-manager
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi
