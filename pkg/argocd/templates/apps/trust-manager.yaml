apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: trust-manager
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: nebari-foundational
    app.kubernetes.io/managed-by: nebari-infrastructure-core
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: foundational

  source:
    chart: trust-manager
    repoURL: https://charts.jetstack.io
    targetRevision: v0.22.1
    helm:
      releaseName: trust-manager
      values: |
        crds:
          enabled: true
        # The default CA package (debian ca-certificates) backs the
        # useDefaultCAs source in the nebari-trust-bundle Bundle; trust-manager
        # rejects such Bundles when it runs without a default package. Enabled
        # by chart default, pinned explicitly because the Bundle depends on it.
        defaultPackage:
          enabled: true
        app:
          trust:
            namespace: cert-manager
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi

  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
