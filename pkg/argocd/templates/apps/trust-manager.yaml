apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: trust-manager
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: nebari-foundational
    app.kubernetes.io/managed-by: nebari-infrastructure-core
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: foundational

  sources:
    - chart: trust-manager
      repoURL: https://charts.jetstack.io
      targetRevision: v0.22.1
      helm:
        releaseName: trust-manager
        valueFiles:
          - $values/{{ if .GitPath }}{{ .GitPath }}/{{ end }}values/trust-manager/base.yaml
          - $values/{{ if .GitPath }}{{ .GitPath }}/{{ end }}values/trust-manager/overlays/*.yaml
        ignoreMissingValueFiles: true
    - repoURL: {{ .GitRepoURL }}
      targetRevision: {{ .GitBranch }}
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
