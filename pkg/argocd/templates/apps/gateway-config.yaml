apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gateway-config
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: nebari-foundational
    app.kubernetes.io/managed-by: nebari-infrastructure-core
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: foundational

  source:
    repoURL: {{ .GitRepoURL }}
    targetRevision: {{ .GitBranch }}
    path: {{ if .GitPath }}{{ .GitPath }}/{{ end }}manifests/networking

  destination:
    server: https://kubernetes.default.svc

  # NebariApp reconciliation extends the shared Gateway with one TLS listener
  # per application. Those listeners are intentionally operator-owned and are
  # not part of NIC's base Gateway desired state.
  ignoreDifferences:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: nebari-gateway
      namespace: envoy-gateway-system
      jqPathExpressions:
        - '.spec.listeners[] | select(.name | startswith("tls-"))'

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
