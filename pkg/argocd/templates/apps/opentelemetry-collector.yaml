apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: opentelemetry-collector
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: nebari-foundational
    app.kubernetes.io/managed-by: nebari-infrastructure-core
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: foundational

  source:
    chart: opentelemetry-collector
    repoURL: https://open-telemetry.github.io/opentelemetry-helm-charts
    targetRevision: 0.143.0
    helm:
      releaseName: opentelemetry-collector
      values: |
        image:
          repository: otel/opentelemetry-collector-k8s
          tag: ""
        mode: daemonset
        presets:
          kubernetesAttributes:
            enabled: true
        # ClusterRole for the prometheus receiver's kubernetes_sd_configs to
        # discover pods cluster-wide and scrape their /metrics endpoints. The
        # chart defaults to clusterRole.create=false, which would leave the
        # SA unable to list pods and the prometheus receiver silently empty.
        # Resources scraped: pods (via role: pod), nodes (cAdvisor / kubelet),
        # endpoints/services (future scrape configs). nodes/metrics + /metrics
        # cover kubelet and apiserver metrics if scrape configs are added.
        #
        # Note: nodes/proxy grants access to the full kubelet proxy, not just
        # /metrics paths. RBAC cannot restrict by URL path; the proxy itself
        # decides what to expose. This is inherent to the apiserver-proxy
        # approach for scraping kubelet metrics.
        clusterRole:
          create: true
          rules:
            - apiGroups: [""]
              resources: ["pods", "nodes", "services", "endpoints"]
              verbs: ["get", "list", "watch"]
            - apiGroups: [""]
              resources: ["nodes/metrics", "nodes/proxy"]
              verbs: ["get"]
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        extraEnvs:
          - name: K8S_NODE_NAME
            valueFrom:
              fieldRef:
                fieldPath: spec.nodeName
        config:
          receivers:
            otlp:
              protocols:
                grpc:
                  endpoint: 0.0.0.0:4317
                http:
                  endpoint: 0.0.0.0:4318
            prometheus:
              config:
                scrape_configs:
                  # Pods that opt in via `prometheus.io/scrape: "true"`
                  # annotation (e.g. kube-state-metrics, prometheus-node-exporter).
                  - job_name: 'kubernetes-pods'
                    kubernetes_sd_configs:
                      - role: pod
                    relabel_configs:
                      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
                        action: keep
                        regex: true
                      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
                        action: replace
                        target_label: __metrics_path__
                        regex: (.+)
                      - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
                        action: replace
                        regex: ([^:]+)(?::\d+)?;(\d+)
                        replacement: $1:$2
                        target_label: __address__

                  # cAdvisor — per-container CPU/memory/network metrics
                  # exposed by the kubelet. Required for the Kubernetes
                  # Views / Pods + Namespaces dashboards (container_cpu_*,
                  # container_memory_*). Routed via the apiserver proxy so
                  # it works regardless of kubelet network reachability.
                  # Each daemonset pod scrapes only its own node via K8S_NODE_NAME.
                  - job_name: 'kubernetes-cadvisor'
                    scheme: https
                    tls_config:
                      ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
                    bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
                    kubernetes_sd_configs:
                      - role: node
                    relabel_configs:
                      - source_labels: [__meta_kubernetes_node_name]
                        regex: ${env:K8S_NODE_NAME}
                        action: keep
                      - action: labelmap
                        regex: __meta_kubernetes_node_label_(.+)
                      - target_label: __address__
                        replacement: kubernetes.default.svc:443
                      - source_labels: [__meta_kubernetes_node_name]
                        regex: (.+)
                        target_label: __metrics_path__
                        replacement: /api/v1/nodes/$${1}/proxy/metrics/cadvisor

                  # Kubelet's own /metrics — node-level pod lifecycle,
                  # volume, runtime metrics. Same apiserver-proxy approach.
                  # Each daemonset pod scrapes only its own node via K8S_NODE_NAME.
                  - job_name: 'kubernetes-kubelet'
                    scheme: https
                    tls_config:
                      ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
                    bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
                    kubernetes_sd_configs:
                      - role: node
                    relabel_configs:
                      - source_labels: [__meta_kubernetes_node_name]
                        regex: ${env:K8S_NODE_NAME}
                        action: keep
                      - action: labelmap
                        regex: __meta_kubernetes_node_label_(.+)
                      - target_label: __address__
                        replacement: kubernetes.default.svc:443
                      - source_labels: [__meta_kubernetes_node_name]
                        regex: (.+)
                        target_label: __metrics_path__
                        replacement: /api/v1/nodes/$${1}/proxy/metrics
          processors:
            batch:
              timeout: 10s
              send_batch_size: 1024
            memory_limiter:
              check_interval: 1s
              limit_mib: 512
          exporters:
            debug:
              verbosity: detailed
            otlp:
              endpoint: "localhost:4317"
              tls:
                insecure: true
          service:
            pipelines:
              metrics:
                receivers: [otlp, prometheus]
                processors: [memory_limiter, batch]
                exporters: [debug]
              logs:
                receivers: [otlp]
                processors: [memory_limiter, batch]
                exporters: [debug]
              traces:
                receivers: [otlp]
                processors: [memory_limiter, batch]
                exporters: [debug]
        ports:
          otlp:
            enabled: true
            containerPort: 4317
            servicePort: 4317
            protocol: TCP
          otlp-http:
            enabled: true
            containerPort: 4318
            servicePort: 4318
            protocol: TCP
          metrics:
            enabled: true
            containerPort: 8888
            servicePort: 8888
            protocol: TCP

        # Software-pack extension point — see ADR-0005. A Nebari software
        # pack (e.g. nebari-lgtm-pack) creates a ConfigMap named
        # `opentelemetry-collector-overrides` in the `monitoring` namespace
        # containing a `relay.yaml` key — a partial OTel config that's
        # deep-merged with the base config above at collector startup. The
        # init container copies the override file into an emptyDir, falling
        # back to an empty mapping `{}` if no software pack has provided one.
        # We do NOT try to share the chart's main ConfigMap because ArgoCD's
        # `ignoreDifferences` does not survive sync (upstream issue
        # argoproj/argo-cd#7478) — separate ConfigMaps mean NIC and software
        # packs never write to the same resource.
        extraVolumes:
          - name: overrides-src
            configMap:
              name: opentelemetry-collector-overrides
              optional: true
          - name: overrides-resolved
            emptyDir: {}
        extraVolumeMounts:
          - name: overrides-resolved
            mountPath: /conf/overrides
            readOnly: true
        initContainers:
          - name: ensure-overrides
            image: busybox@sha256:9532d8c39891ca2ecde4d30d7710e01fb739c87a8b9299685c63704296b16028
            command:
              - sh
              - -c
              - |
                if [ -f /src/relay.yaml ]; then
                  echo "ensure-overrides: found /src/relay.yaml from software pack ConfigMap, using override config"
                  cp /src/relay.yaml /dst/relay.yaml
                else
                  echo "ensure-overrides: no /src/relay.yaml found (ConfigMap absent or missing key), using empty fallback {}"
                  echo '{}' > /dst/relay.yaml
                fi
            volumeMounts:
              - name: overrides-src
                mountPath: /src
                readOnly: true
              - name: overrides-resolved
                mountPath: /dst
        command:
          extraArgs:
            - "--config=/conf/overrides/relay.yaml"

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
