apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: opentelemetry-collector
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: nebari-foundational
    app.kubernetes.io/managed-by: nebari-infrastructure-core
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: foundational

  # Allow software packs (e.g. nebari-lgtm-pack) to overwrite the collector
  # config without ArgoCD reverting it. The data.relay field holds the entire
  # collector config; everything else (labels, annotations, existence) still
  # reconciles normally. Requires RespectIgnoreDifferences=true in syncOptions
  # below to be effective during sync (not just drift detection).
  #
  # The ConfigMap name comes from the chart's fullname helper + "-agent".
  # The fullname helper collapses when the release name contains the chart
  # name — both are "opentelemetry-collector" here, so fullname is just
  # "opentelemetry-collector" and the ConfigMap is "opentelemetry-collector-agent"
  # (NOT the double-prefixed "opentelemetry-collector-opentelemetry-collector-agent"
  # you'd see with a different release name). If you bump targetRevision
  # below or rename the release, re-verify with `helm template` that the
  # rendered name still matches — otherwise this rule silently stops
  # applying and packs will start getting clobbered with no test failure.
  ignoreDifferences:
    - group: ""
      kind: ConfigMap
      name: opentelemetry-collector-agent
      namespace: monitoring
      jsonPointers:
        - /data/relay

  source:
    chart: opentelemetry-collector
    repoURL: https://open-telemetry.github.io/opentelemetry-helm-charts
    targetRevision: 0.143.0
    helm:
      releaseName: opentelemetry-collector
      values: |
        image:
          repository: otel/opentelemetry-collector-k8s
          tag: ""
        mode: daemonset
        # ClusterRole for the prometheus receiver's kubernetes_sd_configs to
        # discover pods cluster-wide and scrape their /metrics endpoints. The
        # chart defaults to clusterRole.create=false, which would leave the
        # SA unable to list pods and the prometheus receiver silently empty.
        # Resources scraped: pods (via role: pod), nodes (cAdvisor / kubelet),
        # endpoints/services (future scrape configs). nodes/metrics + /metrics
        # cover kubelet and apiserver metrics if scrape configs are added.
        clusterRole:
          create: true
          rules:
            - apiGroups: [""]
              resources: ["pods", "nodes", "services", "endpoints"]
              verbs: ["get", "list", "watch"]
            - apiGroups: [""]
              resources: ["nodes/metrics", "nodes/proxy"]
              verbs: ["get"]
            - nonResourceURLs: ["/metrics"]
              verbs: ["get"]
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        config:
          receivers:
            otlp:
              protocols:
                grpc:
                  endpoint: 0.0.0.0:4317
                http:
                  endpoint: 0.0.0.0:4318
            prometheus:
              config:
                scrape_configs:
                  - job_name: 'kubernetes-pods'
                    kubernetes_sd_configs:
                      - role: pod
                    relabel_configs:
                      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
                        action: keep
                        regex: true
                      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
                        action: replace
                        target_label: __metrics_path__
                        regex: (.+)
                      - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
                        action: replace
                        regex: ([^:]+)(?::\d+)?;(\d+)
                        replacement: $1:$2
                        target_label: __address__
          processors:
            batch:
              timeout: 10s
              send_batch_size: 1024
            memory_limiter:
              check_interval: 1s
              limit_mib: 512
          exporters:
            debug:
              verbosity: detailed
            otlp:
              endpoint: "localhost:4317"
              tls:
                insecure: true
          service:
            pipelines:
              metrics:
                receivers: [otlp, prometheus]
                processors: [memory_limiter, batch]
                exporters: [debug]
              logs:
                receivers: [otlp]
                processors: [memory_limiter, batch]
                exporters: [debug]
              traces:
                receivers: [otlp]
                processors: [memory_limiter, batch]
                exporters: [debug]
        ports:
          otlp:
            enabled: true
            containerPort: 4317
            servicePort: 4317
            protocol: TCP
          otlp-http:
            enabled: true
            containerPort: 4318
            servicePort: 4318
            protocol: TCP
          metrics:
            enabled: true
            containerPort: 8888
            servicePort: 8888
            protocol: TCP

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
