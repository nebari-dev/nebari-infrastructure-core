apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: opentelemetry-collector
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: nebari-foundational
    app.kubernetes.io/managed-by: nebari-infrastructure-core
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: foundational

  sources:
    - chart: opentelemetry-collector
      repoURL: https://open-telemetry.github.io/opentelemetry-helm-charts
      targetRevision: 0.143.0
      helm:
        releaseName: opentelemetry-collector
        valueFiles:
          - $values/{{ if .GitPath }}{{ .GitPath }}/{{ end }}values/opentelemetry-collector/base.yaml
          - $values/{{ if .GitPath }}{{ .GitPath }}/{{ end }}values/opentelemetry-collector/overlays/*.yaml
        ignoreMissingValueFiles: true
    - repoURL: {{ .GitRepoURL }}
      targetRevision: {{ .GitBranch }}
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    # Opt the monitoring namespace into Nebari management at creation time.
    # The collector app (sync-wave 4) is the first thing to create this
    # namespace, so any later software pack that drops a NebariApp here
    # (e.g. nebari-lgtm-pack exposing Grafana via the gateway) is reconciled
    # by the nebari-operator instead of rejected with NamespaceNotOptedIn.
    # managedNamespaceMetadata only applies the label to a namespace this app
    # creates, hence it must live on the namespace's creator, not the pack.
    managedNamespaceMetadata:
      labels:
        nebari.dev/managed: "true"
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
