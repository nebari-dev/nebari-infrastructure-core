apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nebari-landingpage
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: nebari-foundational
    app.kubernetes.io/managed-by: nebari-infrastructure-core
  annotations:
    argocd.argoproj.io/sync-wave: "6"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: foundational

  sources:
    # Source 1: landing page Helm chart (hosted in the nebari-landing git repo)
    - repoURL: https://github.com/nebari-dev/nebari-landing
      targetRevision: v0.1.0-alpha.5
      path: charts/nebari-landing
      helm:
        releaseName: nebari-landing
        valueFiles:
          - $values/{{ if .GitPath }}{{ .GitPath }}/{{ end }}values/nebari-landingpage/base.yaml
          - $values/{{ if .GitPath }}{{ .GitPath }}/{{ end }}values/nebari-landingpage/overlays/*.yaml
        ignoreMissingValueFiles: true
    # Source 2: gitops repo, $values ref for valueFiles
    - repoURL: {{ .GitRepoURL }}
      targetRevision: {{ .GitBranch }}
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: nebari-system

  syncPolicy:
    managedNamespaceMetadata:
      labels:
        nebari.dev/managed: "true"
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      # The NebariApp CRD is installed by the nebari-operator (wave 5).
      # ArgoCD dry-runs all resources before syncing, so it reports NebariApp
      # as missing even though wave ordering guarantees the CRD will exist by
      # the time this app (wave 6) actually applies. Skip the dry-run for any
      # resource whose CRD isn't registered yet so the sync doesn't fail on the
      # preflight check.
      - SkipDryRunOnMissingResource=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
