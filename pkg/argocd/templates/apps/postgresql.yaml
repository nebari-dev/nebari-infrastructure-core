apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: postgresql
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: nebari-foundational
    app.kubernetes.io/managed-by: nebari-infrastructure-core
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: foundational

  sources:
    - chart: postgresql
      repoURL: https://charts.bitnami.com/bitnami
      targetRevision: 18.2.0
      helm:
        releaseName: postgresql
        valueFiles:
          - $values/{{ if .GitPath }}{{ .GitPath }}/{{ end }}values/postgresql/base.yaml
          - $values/{{ if .GitPath }}{{ .GitPath }}/{{ end }}values/postgresql/overlays/*.yaml
        ignoreMissingValueFiles: true
    - repoURL: {{ .GitRepoURL }}
      targetRevision: {{ .GitBranch }}
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: keycloak

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  ignoreDifferences:
    - group: apps
      kind: StatefulSet
      jsonPointers:
        - /spec/volumeClaimTemplates
