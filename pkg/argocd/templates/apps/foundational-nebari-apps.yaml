apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: foundational-nebari-apps
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: nebari-foundational
    app.kubernetes.io/managed-by: nebari-infrastructure-core
  annotations:
    argocd.argoproj.io/sync-wave: "6"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: foundational

  source:
    repoURL: {{ .GitRepoURL }}
    targetRevision: {{ .GitBranch }}
    path: "{{ if .GitPath }}{{ .GitPath }}/{{ end }}manifests/foundational-nebari-apps"

  destination:
    server: https://kubernetes.default.svc
    namespace: nebari-system

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      # NebariApp CRD is installed by the nebari-operator (wave 5). Skip the
      # dry-run for resources whose CRD isn't registered yet; wave ordering
      # ensures the CRD exists by the time this app (wave 6) applies.
      - SkipDryRunOnMissingResource=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
