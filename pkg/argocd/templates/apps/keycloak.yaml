apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: keycloak
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: nebari-foundational
    app.kubernetes.io/managed-by: nebari-infrastructure-core
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: foundational

  sources:
    # Source 1: Keycloak Helm chart
    - chart: keycloakx
      repoURL: https://codecentric.github.io/helm-charts
      targetRevision: 7.1.6
      helm:
        releaseName: keycloak
        valueFiles:
          - $values/{{ if .GitPath }}{{ .GitPath }}/{{ end }}values/keycloak/base.yaml
          - $values/{{ if .GitPath }}{{ .GitPath }}/{{ end }}values/keycloak/overlays/*.yaml
        ignoreMissingValueFiles: true
    # Source 2: Realm setup job (PostSync hook); also the $values ref for valueFiles
    - repoURL: {{ .GitRepoURL }}
      targetRevision: {{ .GitBranch }}
      path: {{ if .GitPath }}{{ .GitPath }}/{{ end }}manifests/keycloak
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: keycloak

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  ignoreDifferences:
    - group: apps
      kind: StatefulSet
      jsonPointers:
        - /spec/volumeClaimTemplates
