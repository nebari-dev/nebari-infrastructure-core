# Catch-all redirect from HTTP (port 80) to HTTPS.
# All Nebari services must be served over HTTPS. This route has no hostnames
# filter, so it applies to every hostname on the http listener.
#
# ACME HTTP-01 challenges (/.well-known/acme-challenge/) are NOT blocked by
# this redirect. Cert-manager creates a temporary HTTPRoute with a more specific
# path match during challenges, which takes precedence per Gateway API routing
# rules (most specific path wins). See letsencrypt-clusterissuer.yaml.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: http-to-https-redirect
  namespace: envoy-gateway-system
  labels:
    app.kubernetes.io/name: http-to-https-redirect
    app.kubernetes.io/managed-by: nebari-infrastructure-core
spec:
  parentRefs:
    - name: nebari-gateway
      namespace: envoy-gateway-system
      sectionName: http
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            port: {{ .HTTPSPort }}
            statusCode: 301
