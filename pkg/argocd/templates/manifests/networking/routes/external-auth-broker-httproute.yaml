{{- if .ExternalAuthBrokerEnabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: external-auth-broker
  namespace: {{ .ExternalAuthBrokerServiceNamespace }}
  labels:
    app.kubernetes.io/name: external-auth-broker
    app.kubernetes.io/managed-by: nebari-infrastructure-core
spec:
  parentRefs:
    - name: nebari-gateway
      namespace: envoy-gateway-system
      sectionName: https
  hostnames:
    - "{{ .ExternalAuthBrokerHostname }}"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ .ExternalAuthBrokerPathPrefix }}
      backendRefs:
        - name: {{ .ExternalAuthBrokerServiceName }}
          port: {{ .ExternalAuthBrokerServicePort }}
{{- end }}
