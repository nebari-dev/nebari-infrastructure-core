apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd
    app.kubernetes.io/managed-by: nebari-infrastructure-core
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: nebari-gateway
      namespace: envoy-gateway-system
      sectionName: https
  hostnames:
    - "argocd.{{ .Domain }}"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: argocd-server
          port: 80
          weight: 1
