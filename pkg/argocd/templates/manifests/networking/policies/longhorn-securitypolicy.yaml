apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: longhorn-oidc
  namespace: longhorn-system
  labels:
    app.kubernetes.io/name: longhorn
    app.kubernetes.io/managed-by: nebari-infrastructure-core
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: longhorn
  oidc:
    provider:
      issuer: "https://keycloak.{{ .Domain }}{{ .KeycloakBasePath }}/realms/nebari"
    clientID: longhorn
    clientSecret:
      name: {{ .LonghornOIDCSecretName }}
      # Pin the fields the Envoy Gateway SecurityPolicy CRD server-defaults, so the
      # rendered manifest matches the stored object and the securitypolicies app
      # stays Synced. ServerSideApply does not suppress this diff (argoproj/argo-cd#7478),
      # and we deliberately no longer use ignoreDifferences.
      kind: Secret
      group: ""
    redirectURL: "https://longhorn.{{ .Domain }}/oauth2/callback"
    logoutPath: "/oauth2/logout"
    scopes:
      - openid
      - profile
      - email
      - groups
    forwardAccessToken: true
    refreshToken: true # CRD default; pin to avoid ArgoCD drift (see clientSecret note)
  jwt:
    providers:
      - name: keycloak
        issuer: "https://keycloak.{{ .Domain }}{{ .KeycloakBasePath }}/realms/nebari"
        remoteJWKS:
          uri: "{{ .KeycloakServiceURL }}/realms/nebari/protocol/openid-connect/certs"
          cacheDuration: "300s" # CRD default; pin to avoid ArgoCD drift (see clientSecret note)
  authorization:
    defaultAction: Deny
    rules:
      - name: allow-longhorn-admins
        action: Allow
        principal:
          jwt:
            provider: keycloak
            claims:
              # The data-science-pack chart's RBAC bootstrap job
              # (files/keycloak_rbac_bootstrap.py) reconciles the realm-shared
              # groups mapper to full.path=true on every sync, so JWTs always
              # carry group names with a leading slash (e.g. "/longhorn-admins")
              # regardless of what we set in realm-setup-job. Match against the
              # path form rather than fighting that job.
              - name: groups
                valueType: StringArray
                values:
                  - /longhorn-admins
