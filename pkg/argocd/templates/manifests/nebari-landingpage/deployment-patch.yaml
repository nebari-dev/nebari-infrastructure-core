apiVersion: apps/v1
kind: Deployment
metadata:
  name: webapi
  namespace: nebari-system
spec:
  selector:
    matchLabels:
      app.kubernetes.io/component: webapi
      app.kubernetes.io/name: nebari-operator
  template:
    spec:
      containers:
        - name: api
          env:
            # JWT validation
            - name: ENABLE_AUTH
              value: "true"
            - name: KEYCLOAK_URL
              value: "{{ .KeycloakAuthURL }}"
            - name: KEYCLOAK_ISSUER_URL
              value: "{{ .KeycloakIssuerURL }}"
            - name: KEYCLOAK_REALM
              value: "{{ .KeycloakRealm }}"
            # Keycloak admin credentials — same Secret the operator uses.
            # Secret must contain 'username' and 'password' keys.
            # Note: secretKeyRef only supports same-namespace secrets; the
            # Keycloak admin Secret must be copied to nebari-system if it
            # originates from the keycloak namespace.
            - name: KEYCLOAK_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: "{{ .KeycloakAdminSecretName }}"
                  key: username
                  optional: true
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: "{{ .KeycloakAdminSecretName }}"
                  key: password
                  optional: true
            # Admin access-control
            - name: ADMIN_GROUP
              value: admin
            # Persistent stores (bbolt)
            - name: ACCESS_REQUESTS_DB_PATH
              value: /data/access_requests.db
            - name: NOTIFICATIONS_DB_PATH
              value: /data/notifications.db
            - name: PINS_DB_PATH
              value: /data/pins.db
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 128Mi
