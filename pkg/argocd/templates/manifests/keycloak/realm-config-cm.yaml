apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-realm-config
  namespace: keycloak
  labels:
    app.kubernetes.io/part-of: nebari-foundational
    app.kubernetes.io/managed-by: nebari-infrastructure-core
data:
  # keycloak-config-cli input for the nebari realm.
  # Parity with the previous imperative shell setup, expressed declaratively.
  # `$(env:VAR)` placeholders are substituted by kcc at apply time from env
  # vars set on the Job (see realm-setup-job.yaml).
  realm.yaml: |
    realm: nebari
    enabled: true
    displayName: Nebari
    sslRequired: external
    registrationAllowed: false
    loginWithEmailAllowed: true
    resetPasswordAllowed: true
    bruteForceProtected: true

    defaultDefaultClientScopes:
      - groups

    roles:
      realm:
        - name: admin
          description: Administrator role
        - name: user
          description: Regular user role

    groups:
      - name: argocd-admins
      - name: argocd-viewers

    users:
      - username: admin
        enabled: true
        emailVerified: true
        firstName: Admin
        lastName: User
        email: admin@nebari.local
        realmRoles:
          - admin
          - user
        credentials:
          - type: password
            value: $(env:REALM_ADMIN_PASSWORD)
        groups:
          - /argocd-admins

    clientScopes:
      - name: groups
        protocol: openid-connect
        attributes:
          include.in.token.scope: "true"
          display.on.consent.screen: "true"
        protocolMappers:
          - name: group-membership
            protocol: openid-connect
            protocolMapper: oidc-group-membership-mapper
            config:
              full.path: "false"
              introspection.token.claim: "true"
              userinfo.token.claim: "true"
              multivalued: "true"
              id.token.claim: "true"
              access.token.claim: "true"
              claim.name: groups

    clients:
      - clientId: argocd
        enabled: true
        protocol: openid-connect
        publicClient: false
        secret: $(env:ARGOCD_CLIENT_SECRET)
        redirectUris:
          - https://argocd.{{ .Domain }}/auth/callback
        webOrigins:
          - https://argocd.{{ .Domain }}
        directAccessGrantsEnabled: false
        standardFlowEnabled: true
        defaultClientScopes:
          - groups
