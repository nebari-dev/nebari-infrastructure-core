apiVersion: batch/v1
kind: Job
metadata:
  name: keycloak-realm-setup
  namespace: keycloak
  labels:
    app.kubernetes.io/part-of: nebari-foundational
    app.kubernetes.io/managed-by: nebari-infrastructure-core
  annotations:
    argocd.argoproj.io/hook: PostSync
    # `BeforeHookCreation` deletes any existing Job before creating a new one
    # on each sync. Without it, a Job that fails (bad image, network blip,
    # kcc bug) sits in the cluster forever — Kubernetes Jobs are immutable
    # post-create, so ArgoCD can't update the Job's pod template in place.
    # This makes upgrades safe even from a stuck/failed previous run.
    # `HookSucceeded` additionally deletes the Job after a successful run
    # to avoid Job clutter in steady state.
    argocd.argoproj.io/hook-delete-policy: HookSucceeded,BeforeHookCreation
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: realm-setup
          # Pinned to a kcc release verified in CI against the deployed
          # Keycloak version (currently 26.5.4, set in
          # pkg/argocd/templates/apps/keycloak.yaml). Bumping the Keycloak
          # image requires bumping this tag in lock-step. See:
          # https://redirect.github.com/adorsys/keycloak-config-cli/blob/v6.5.0/.github/workflows/ci.yaml
          image: quay.io/adorsys/keycloak-config-cli:6.5.0-26.5.4
          env:
            # Keycloak connection
            - name: KEYCLOAK_URL
              value: {{ .KeycloakServiceURL }}
            - name: KEYCLOAK_USER
              value: admin
            - name: KEYCLOAK_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .KeycloakAdminSecretName }}
                  key: admin-password
            - name: KEYCLOAK_AVAILABILITYCHECK_ENABLED
              value: "true"
            # Matches the 5-minute readiness window of the previous shell
            # script. Keycloak's first-start Quarkus augmentation can push
            # past 2 minutes on slower runners.
            - name: KEYCLOAK_AVAILABILITYCHECK_TIMEOUT
              value: 300s

            # kcc import behavior
            - name: IMPORT_FILES_LOCATIONS
              value: /config/realm.yaml
            - name: IMPORT_VARSUBSTITUTION_ENABLED
              value: "true"
            - name: IMPORT_VARSUBSTITUTION_UNDEFINEDISERROR
              value: "true"
            # Default is true since kcc v6.x; explicit here for review
            # clarity. kcc tracks resources it created in a Keycloak realm
            # attribute, so re-runs only touch resources kcc itself manages.
            - name: IMPORT_REMOTESTATE_ENABLED
              value: "true"
            # Belt-and-braces: never delete clients on re-run, even ones
            # that disappear from the input. Protects operator-managed
            # OAuth2 clients (created at runtime via NebariApplication CRDs)
            # if the input config ever changes shape.
            - name: IMPORT_MANAGED_CLIENT
              value: "no-delete"

            # Substituted into realm.yaml at kcc apply time
            - name: REALM_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nebari-realm-admin-credentials
                  key: password
            - name: ARGOCD_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: argocd-oidc-client-secret
                  key: client-secret
          volumeMounts:
            - name: realm-config
              mountPath: /config
              readOnly: true
      volumes:
        # The kcc input lives in an in-cluster Secret created by NIC at
        # bootstrap (see pkg/argocd/foundational.go createKeycloakImportSecret).
        # Using a Secret rather than a ConfigMap keeps realm structure and any
        # inline credentials out of the gitops repo entirely; only this Job
        # manifest sits there.
        - name: realm-config
          secret:
            secretName: keycloak-config-import
