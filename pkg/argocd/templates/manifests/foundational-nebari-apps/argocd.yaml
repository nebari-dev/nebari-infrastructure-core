# ExternalName Service — allows the operator's ValidateService check to resolve
# the ArgoCD server from nebari-system without cross-namespace references.
# No real traffic flows through this; routing is handled by the dedicated
# argocd HTTPRoute in the argocd namespace (not the nebari-operator).
apiVersion: v1
kind: Service
metadata:
  name: argocd-proxy
  namespace: nebari-system
spec:
  type: ExternalName
  externalName: argocd-server.argocd.svc.cluster.local
  ports:
    - name: http
      port: 80
      protocol: TCP
---
# NebariApp registration for the ArgoCD GitOps controller.
#
# Purpose: make ArgoCD visible on the Nebari landing page dashboard.
# Routing is intentionally disabled (spec.routing omitted) — ArgoCD's route
# is managed by the dedicated HTTPRoute in templates/manifests/networking/.
# Auth is disabled — ArgoCD has its own SSO integration; gateway-level OIDC
# enforcement would interfere with ArgoCD's authentication flow.
apiVersion: reconcilers.nebari.dev/v1
kind: NebariApp
metadata:
  name: argocd
  namespace: nebari-system
spec:
  hostname: "argocd.{{ .Domain }}"

  service:
    name: argocd-proxy
    port: 80

  # Omit routing entirely — no HTTPRoute or TLS certificate will be created.
  # The argocd HTTPRoute in templates/manifests/networking/routes/ handles routing.

  auth:
    enabled: false

  landingPage:
    enabled: true
    displayName: "ArgoCD"
    description: "GitOps continuous delivery — manage and sync Kubernetes application state from Git."
    icon: argocd
    category: Platform
    priority: 20
