# ExternalName Service — allows the operator's ValidateService check to resolve
# the Keycloak backend from nebari-system without cross-namespace references.
# No real traffic flows through this; routing is handled by Keycloak's own
# HTTPRoute (not the nebari-operator).
apiVersion: v1
kind: Service
metadata:
  name: keycloak-proxy
  namespace: nebari-system
spec:
  type: ExternalName
  externalName: keycloak-keycloakx-http.keycloak.svc.cluster.local
  ports:
    - name: http
      port: 8080
      protocol: TCP
---
# NebariApp registration for the Keycloak identity provider.
#
# Purpose: make Keycloak visible on the Nebari landing page dashboard.
# Routing is intentionally disabled (spec.routing omitted) — Keycloak manages
# its own HTTPRoute. Auth is disabled — Keycloak IS the OIDC provider, so
# enforcing OIDC on it would be circular. Gateway is set to "public" as a
# required default but no HTTPRoute is created without spec.routing.
apiVersion: reconcilers.nebari.dev/v1
kind: NebariApp
metadata:
  name: keycloak
  namespace: nebari-system
spec:
  hostname: "keycloak.{{ .Domain }}"

  service:
    name: keycloak-proxy
    port: 8080

  # Omit routing entirely — no HTTPRoute or TLS certificate will be created.
  # Keycloak's own Helm chart manages its route independently.

  auth:
    enabled: false

  landingPage:
    enabled: true
    displayName: "Keycloak"
    description: "Identity and access management — manage users, realms, and OIDC clients."
    icon: keycloak
    category: Platform
    priority: 10
