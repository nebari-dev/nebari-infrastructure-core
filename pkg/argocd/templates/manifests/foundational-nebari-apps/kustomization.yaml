apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# All resources live in nebari-system — the namespace where the nebari-operator
# watches for NebariApp CRs (nebari.dev/managed=true label set by the
# nebari-operator kustomization at wave 5).
namespace: nebari-system

resources:
  - keycloak.yaml
  - argocd.yaml
