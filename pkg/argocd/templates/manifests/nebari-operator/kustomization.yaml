apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: nebari-operator-system

# TODO: Pinned to PR commit for testing. DO NOT MERGE until
# https://github.com/nebari-dev/nebari-operator/pull/71 is merged,
# a new release is cut, and both ref and newTag below are updated
# to point at that release.
resources:
  - https://github.com/nebari-dev/nebari-operator.git/config/default?ref=fix/keycloak-context-path-default

images:
  - name: nebari-operator
    newName: quay.io/nebari/nebari-operator
    newTag: fix-keycloak-context-path-default

patches:
  - path: deployment-patch.yaml
    target:
      kind: Deployment
      name: nebari-operator-controller-manager
