version: 2

before:
  hooks:
    - go mod tidy
    - go mod verify

builds:
  - id: nic
    main: ./cmd/nic
    binary: nic
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
    flags:
      - -trimpath

archives:
  - id: nic-archive
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE*
      - docs/**/*
      - examples/**/*

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

# Homebrew cask (GoReleaser's native, non-deprecated brew support). Casks
# install on macOS only; Linux users download the release archives directly
# (the archive naming is documented in the release notes below).
homebrew_casks:
  - name: nic
    binaries:
      - nic
    ids:
      - nic-archive
    repository:
      owner: nebari-dev
      name: homebrew-tap
      branch: main
      # Cross-repo push: the default GITHUB_TOKEN only grants write to this repo.
      # HOMEBREW_TAP_TOKEN is an org-level secret (write access to the tap),
      # passed through by the release workflow.
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    description: "Nebari Infrastructure Core - cloud infrastructure management for Nebari"
    homepage: "https://github.com/nebari-dev/nebari-infrastructure-core"
    commit_msg_template: "Brew cask update for {{ .ProjectName }} version {{ .Tag }}"
    hooks:
      post:
        # Published binaries are not code-signed or notarized, so macOS Gatekeeper
        # quarantines them and `nic` fails to launch. Strip the quarantine xattr on
        # install so the CLI runs without the "developer cannot be verified" prompt.
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/nic"]
          end

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^ci:'
      - Merge pull request
      - Merge branch
  groups:
    - title: Features
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: 'Bug fixes'
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: 'Performance improvements'
      regexp: '^.*?perf(\([[:word:]]+\))??!?:.+$'
      order: 2
    - title: Others
      order: 999

release:
  github:
    owner: nebari-dev
    name: nebari-infrastructure-core
  draft: false
  prerelease: auto
  mode: replace
  header: |
    ## Nebari Infrastructure Core {{ .Tag }}

    Release of Nebari Infrastructure Core (NIC) version {{ .Tag }}.

    ### Installation

    #### Homebrew (macOS)
    ```bash
    brew install nebari-dev/tap/nic
    ```

    #### Manual download (all platforms)
    Download the appropriate archive for your platform from the assets below, then extract and install.

    ##### Linux/macOS
    ```bash
    # Download and extract (adjust os/arch to match your platform)
    tar -xzf {{ .ProjectName }}_{{ .Version }}_linux_x86_64.tar.gz

    # Move to PATH
    sudo mv nic /usr/local/bin/

    # Verify installation
    nic version
    ```

    ##### Windows
    Extract the zip file and add `nic.exe` to your PATH.

  footer: |
    **Full Changelog**: https://github.com/nebari-dev/nebari-infrastructure-core/compare/{{ .PreviousTag }}...{{ .Tag }}

snapshot:
  version_template: "{{ incpatch .Version }}-next"

source:
  enabled: true
  name_template: '{{ .ProjectName }}-{{ .Version }}-source'

signs:
  - cmd: cosign
    signature: "${artifact}.sigstore.json"
    args:
      - "sign-blob"
      - "--bundle=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum

sboms:
  - artifacts: archive
